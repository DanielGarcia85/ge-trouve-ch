<svg viewBox="0 0 1000 1372" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="1372" fill="#FFFFFF"/>
  <g transform="translate(0,-38)">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrv" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- ================= ZONE 1 ================= -->
  <rect x="14" y="56" width="972" height="416" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="34" y="86" font-size="15.5" font-weight="700" fill="#1F2937">1. Vue d'ensemble : de la question de l'usager à la réponse générée</text>

  <!-- Boite entree -->
  <rect x="34" y="128" width="132" height="140" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="100" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Phrase</text>
  <text x="100" y="173" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">d'entrée</text>
  <text x="100" y="196" text-anchor="middle" font-size="12" fill="#4B5563">« Où déposer ma</text>
  <text x="100" y="213" text-anchor="middle" font-size="12" fill="#4B5563">demande de</text>
  <text x="100" y="230" text-anchor="middle" font-size="12" fill="#4B5563">permis de</text>
  <text x="100" y="247" text-anchor="middle" font-size="12" fill="#4B5563">séjour ? »</text>

  <line x1="168" y1="198" x2="184" y2="198" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Boite embeddings -->
  <rect x="184" y="140" width="118" height="116" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="243" y="166" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400E">Embeddings</text>
  <text x="243" y="183" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400E">+ position</text>
  <text x="243" y="207" text-anchor="middle" font-size="11" fill="#92400E">chaque mot devient</text>
  <text x="243" y="222" text-anchor="middle" font-size="11" fill="#92400E">un vecteur : une liste</text>
  <text x="243" y="237" text-anchor="middle" font-size="11" fill="#92400E">de nombres</text>

  <line x1="304" y1="198" x2="320" y2="198" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ENCODEUR -->
  <rect x="320" y="104" width="204" height="240" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
  <text x="422" y="130" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1E40AF">ENCODEUR</text>
  <text x="422" y="148" text-anchor="middle" font-size="11" fill="#3B82F6">(pile de N couches identiques)</text>
  <rect x="330" y="158" width="184" height="62" rx="9" fill="none" stroke="#7C3AED" stroke-width="1.7" stroke-dasharray="5 3"/>
  <rect x="336" y="163" width="172" height="52" rx="6" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.1"/>
  <text x="422" y="184" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1E40AF">Auto-attention</text>
  <text x="422" y="202" text-anchor="middle" font-size="11" fill="#3B82F6">les mots se regardent entre eux</text>
  <circle cx="497" cy="173" r="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <line x1="501.2" y1="177.2" x2="506" y2="182" stroke="#7C3AED" stroke-width="2.4"/>
  <rect x="336" y="228" width="172" height="50" rx="6" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.1"/>
  <text x="422" y="249" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1E40AF">Réseau feed-forward</text>
  <text x="422" y="266" text-anchor="middle" font-size="11" fill="#3B82F6">affine chaque mot séparément</text>
  <text x="422" y="306" text-anchor="middle" font-size="11" fill="#3B82F6">analyse toute la phrase</text>
  <text x="422" y="322" text-anchor="middle" font-size="11" fill="#3B82F6">d'un coup, en parallèle</text>

  <line x1="526" y1="198" x2="542" y2="198" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DECODEUR -->
  <rect x="542" y="104" width="220" height="240" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="652" y="130" text-anchor="middle" font-size="14.5" font-weight="700" fill="#166534">DÉCODEUR</text>
  <text x="652" y="148" text-anchor="middle" font-size="11" fill="#22C55E">(pile de N couches identiques)</text>
  <rect x="556" y="158" width="192" height="48" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.1"/>
  <text x="652" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Auto-attention masquée</text>
  <text x="652" y="194" text-anchor="middle" font-size="11" fill="#22C55E">les mots déjà écrits se regardent</text>
  <rect x="556" y="212" width="192" height="48" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.1"/>
  <text x="652" y="231" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Attention sur l'encodeur</text>
  <text x="652" y="248" text-anchor="middle" font-size="11" fill="#22C55E">la réponse consulte la question</text>
  <rect x="556" y="266" width="192" height="40" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.1"/>
  <text x="652" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Réseau feed-forward</text>
  <text x="652" y="326" text-anchor="middle" font-size="11" fill="#22C55E">écrit la réponse mot après mot</text>

  <line x1="764" y1="198" x2="780" y2="198" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Boite sortie -->
  <rect x="780" y="128" width="188" height="140" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="874" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Réponse générée</text>
  <text x="874" y="186" text-anchor="middle" font-size="12" fill="#4B5563">« À votre</text>
  <text x="874" y="203" text-anchor="middle" font-size="12" fill="#4B5563">commune de</text>
  <text x="874" y="220" text-anchor="middle" font-size="12" fill="#4B5563">domicile. »</text>

  <!-- Texte explicatif zone 1 -->
  <text x="500" y="376" text-anchor="middle" font-size="12" fill="#4B5563">L'encodeur transforme la question en une représentation riche, où chaque mot a été précisé par ses voisins.</text>
  <text x="500" y="394" text-anchor="middle" font-size="12" fill="#4B5563">Le décodeur s'appuie sur cette représentation pour écrire la réponse un mot à la fois : à chaque nouveau mot, il relit</text>
  <text x="500" y="412" text-anchor="middle" font-size="12" fill="#4B5563">ce qu'il a déjà écrit (auto-attention masquée) et va consulter la question (attention sur l'encodeur).</text>
  <text x="500" y="444" text-anchor="middle" font-size="12" font-style="italic" fill="#9CA3AF">Le cœur commun de ces blocs est le mécanisme d'attention, détaillé dans la zone 2.</text>

  <!-- ================= ZONE 2 ================= -->
  <rect x="14" y="488" width="972" height="530" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="32" cy="514" r="7" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
  <line x1="37.2" y1="519.2" x2="43" y2="525" stroke="#7C3AED" stroke-width="2.6"/>
  <text x="52" y="520" font-size="15.5" font-weight="700" fill="#1F2937">2. Zoom sur l'auto-attention : le mot « permis » interroge la phrase</text>
  <text x="34" y="544" font-size="12" fill="#6B7280">Ce qui se passe dans le bloc « Auto-attention » entouré en pointillés ci-dessus. On suit ici la requête du mot « permis »,</text>
  <text x="34" y="561" font-size="12" fill="#6B7280">mais chaque mot de la phrase fait exactement la même chose en parallèle, avec sa propre requête, sa clé et sa valeur.</text>

  <!-- legende epaisseur -->
  <line x1="700" y1="540" x2="736" y2="540" stroke="#D97706" stroke-width="5" opacity="0.9"/>
  <text x="744" y="544" font-size="12" fill="#6B7280">attention forte</text>
  <line x1="700" y1="559" x2="736" y2="559" stroke="#D97706" stroke-width="1.2" opacity="0.5"/>
  <text x="744" y="563" font-size="12" fill="#6B7280">attention faible</text>

  <!-- Mot focal -->
  <rect x="44" y="600" width="180" height="86" rx="12" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>
  <text x="134" y="632" text-anchor="middle" font-size="16" font-weight="700" fill="#92400E">permis</text>
  <text x="134" y="654" text-anchor="middle" font-size="11" fill="#92400E">le mot que l'on suit</text>
  <text x="134" y="669" text-anchor="middle" font-size="11" fill="#92400E">dans cet exemple</text>

  <!-- Requete -->
  <rect x="44" y="700" width="180" height="86" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.4"/>
  <text x="134" y="722" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">sa requête (query)</text>
  <text x="134" y="740" text-anchor="middle" font-size="11" fill="#92400E">un vecteur calculé à partir</text>
  <text x="134" y="754" text-anchor="middle" font-size="11" fill="#92400E">du sens de « permis » :</text>
  <text x="134" y="768" text-anchor="middle" font-size="11" fill="#92400E">ce qu'il « cherche » dans</text>
  <text x="134" y="781" text-anchor="middle" font-size="11" fill="#92400E">son entourage</text>

  <!-- Note tetes multiples -->
  <rect x="44" y="804" width="180" height="108" rx="10" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.4"/>
  <text x="134" y="828" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">Plusieurs têtes</text>
  <text x="134" y="844" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">d'attention</text>
  <text x="134" y="860" text-anchor="middle" font-size="11" fill="#7C3AED">cette même lecture est menée</text>
  <text x="134" y="878" text-anchor="middle" font-size="11" fill="#7C3AED">plusieurs fois en parallèle ;</text>
  <text x="134" y="892" text-anchor="middle" font-size="11" fill="#7C3AED">chaque tête capte un type de</text>
  <text x="134" y="906" text-anchor="middle" font-size="11" fill="#7C3AED">relation (grammaire, renvois…)</text>

  <!-- Connecteurs d'attention -->
  <path d="M 224 668 Q 390 606 560 622" fill="none" stroke="#D97706" stroke-width="5" opacity="0.9"/>
  <path d="M 224 676 Q 390 690 560 704" fill="none" stroke="#D97706" stroke-width="4.2" opacity="0.85"/>
  <path d="M 224 684 Q 390 748 560 786" fill="none" stroke="#D97706" stroke-width="2.2" opacity="0.6"/>
  <path d="M 224 690 Q 390 800 560 868" fill="none" stroke="#D97706" stroke-width="1.8" opacity="0.55"/>
  <text x="385" y="622" text-anchor="middle" font-size="11" font-weight="600" fill="#B45309">35 %</text>
  <text x="385" y="700" text-anchor="middle" font-size="11" font-weight="600" fill="#B45309">25 %</text>
  <text x="385" y="768" text-anchor="middle" font-size="11" fill="#B45309" opacity="0.8">15 %</text>
  <text x="385" y="822" text-anchor="middle" font-size="11" fill="#B45309" opacity="0.75">10 %</text>

  <!-- Cartes des autres mots -->
  <rect x="560" y="588" width="406" height="68" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.3"/>
  <rect x="574" y="601" width="76" height="42" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.1"/>
  <text x="612" y="617" text-anchor="middle" font-size="11" fill="#4338CA">sa clé (key)</text>
  <text x="612" y="633" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3730A3">séjour</text>
  <text x="662" y="612" font-size="11" fill="#64748B">sa valeur (value) :</text>
  <text x="662" y="630" font-size="12" fill="#334155">la nature du titre demandé :</text>
  <text x="662" y="646" font-size="12" fill="#334155">un permis de séjour</text>

  <rect x="560" y="670" width="406" height="68" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.3"/>
  <rect x="574" y="683" width="76" height="42" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.1"/>
  <text x="612" y="699" text-anchor="middle" font-size="11" fill="#4338CA">sa clé (key)</text>
  <text x="612" y="715" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3730A3">demande</text>
  <text x="662" y="694" font-size="11" fill="#64748B">sa valeur (value) :</text>
  <text x="662" y="712" font-size="12" fill="#334155">l'objet dont il est question :</text>
  <text x="662" y="728" font-size="12" fill="#334155">une demande officielle</text>

  <rect x="560" y="752" width="406" height="68" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="574" y="765" width="76" height="42" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.1"/>
  <text x="612" y="781" text-anchor="middle" font-size="11" fill="#475569">sa clé (key)</text>
  <text x="612" y="797" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">déposer</text>
  <text x="662" y="776" font-size="11" fill="#64748B">sa valeur (value) :</text>
  <text x="662" y="794" font-size="12" fill="#334155">l'action : le dépôt</text>
  <text x="662" y="810" font-size="12" fill="#334155">d'une demande</text>

  <rect x="560" y="834" width="406" height="68" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.3"/>
  <rect x="574" y="847" width="76" height="42" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.1"/>
  <text x="612" y="863" text-anchor="middle" font-size="11" fill="#475569">sa clé (key)</text>
  <text x="612" y="879" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">Où</text>
  <text x="662" y="858" font-size="11" fill="#64748B">sa valeur (value) :</text>
  <text x="662" y="876" font-size="12" fill="#334155">un lieu est attendu</text>
  <text x="662" y="892" font-size="12" fill="#334155">en réponse</text>

  <!-- Resultat zone 2 -->
  <rect x="44" y="928" width="922" height="74" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="505" y="951" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Résultat</text>
  <text x="505" y="970" text-anchor="middle" font-size="12" fill="#047857">La requête de « permis » est comparée à la clé de chaque mot ; chaque comparaison donne un score, converti en pourcentage</text>
  <text x="505" y="987" text-anchor="middle" font-size="12" fill="#047857">d'attention. Le nouveau sens de « permis » est un mélange des valeurs de tous les mots, pondéré par ces pourcentages.</text>

  <!-- ================= ZONE 3 ================= -->
  <rect x="14" y="1034" width="972" height="352" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="34" y="1064" font-size="15.5" font-weight="700" fill="#1F2937">3. D'où viennent la requête, la clé et la valeur ?</text>
  <text x="34" y="1088" font-size="12" fill="#6B7280">Elles ne sont pas écrites à la main : le modèle applique au vecteur de chaque mot trois transformations, identiques pour tous</text>
  <text x="34" y="1105" font-size="12" fill="#6B7280">les mots, dont le contenu a été appris automatiquement pendant l'entraînement.</text>

  <!-- Pipeline Q/K/V -->
  <rect x="44" y="1136" width="150" height="90" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.4"/>
  <text x="119" y="1166" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">mot « permis »</text>
  <text x="119" y="1188" text-anchor="middle" font-size="12" fill="#4B5563">son vecteur :</text>
  <text x="119" y="1204" text-anchor="middle" font-size="12" fill="#4B5563">[0.2, -1.3, 0.8, …]</text>

  <line x1="196" y1="1181" x2="240" y2="1181" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrv)"/>

  <rect x="242" y="1124" width="216" height="116" rx="10" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="350" y="1148" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">trois transformations apprises</text>
  <rect x="256" y="1160" width="188" height="20" rx="4" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="350" y="1174" text-anchor="middle" font-size="11" fill="#6D28D9">recette n°1  →  requête (Q)</text>
  <rect x="256" y="1186" width="188" height="20" rx="4" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="350" y="1200" text-anchor="middle" font-size="11" fill="#6D28D9">recette n°2  →  clé (K)</text>
  <rect x="256" y="1212" width="188" height="20" rx="4" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>
  <text x="350" y="1226" text-anchor="middle" font-size="11" fill="#6D28D9">recette n°3  →  valeur (V)</text>

  <line x1="460" y1="1181" x2="504" y2="1181" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrv)"/>

  <rect x="506" y="1136" width="200" height="90" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.4"/>
  <text x="606" y="1162" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">trois vecteurs distincts</text>
  <text x="606" y="1184" text-anchor="middle" font-size="11" fill="#92400E">Q, K et V de « permis »,</text>
  <text x="606" y="1200" text-anchor="middle" font-size="11" fill="#92400E">dérivés de son sens mais</text>
  <text x="606" y="1216" text-anchor="middle" font-size="11" fill="#92400E">différents les uns des autres</text>

  <line x1="708" y1="1181" x2="752" y2="1181" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrv)"/>

  <rect x="754" y="1136" width="212" height="90" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.4"/>
  <text x="860" y="1160" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">score d'attention</text>
  <text x="860" y="1182" text-anchor="middle" font-size="11" fill="#1E3A8A">similarité entre la requête Q</text>
  <text x="860" y="1198" text-anchor="middle" font-size="11" fill="#1E3A8A">d'un mot et la clé K d'un autre :</text>
  <text x="860" y="1214" text-anchor="middle" font-size="11" fill="#1E3A8A">élevée si elles « s'accordent »</text>

  <!-- Encadre apprentissage -->
  <rect x="44" y="1258" width="922" height="108" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="505" y="1284" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">Comment ces recettes ont-elles été trouvées ?</text>
  <text x="505" y="1306" text-anchor="middle" font-size="12" fill="#9A3412">Elles démarrent remplies de nombres aléatoires. Pendant l'entraînement, le modèle s'exerce des millions de fois à prédire</text>
  <text x="505" y="1323" text-anchor="middle" font-size="12" fill="#9A3412">des mots sur d'immenses corpus de texte ; chaque erreur ajuste légèrement les nombres. À la fin, les recettes ont convergé :</text>
  <text x="505" y="1340" text-anchor="middle" font-size="12" fill="#9A3412">les mots liés par la grammaire ou par le sens obtiennent naturellement des scores d'attention élevés entre eux.</text>
  <text x="505" y="1357" text-anchor="middle" font-size="12" font-style="italic" fill="#9A3412">Personne n'a écrit ces règles : elles ont émergé de l'apprentissage. C'est le sens du mot « apprendre » en apprentissage automatique.</text>
  </g>
</svg>
