<svg viewBox="0 0 1000 810" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="810" fill="#FFFFFF"/>

  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1F2937">Comment l'attention est-elle calculée ? Un exemple chiffré</text>
  <text x="500" y="64" text-anchor="middle" font-size="15" font-style="italic" font-weight="600" fill="#1F2937">Phrase analysée : « Où déposer ma demande de permis de séjour ? »</text>
  <text x="500" y="86" text-anchor="middle" font-size="12" fill="#6B7280">Vecteurs réduits à 3 nombres pour l'exemple (512 dans l'article original) ; valeurs illustratives.</text>

  <!-- ETAPE 1 -->
  <circle cx="60" cy="102" r="13" fill="#1F2937"/>
  <text x="60" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
  <text x="82" y="107" font-size="13.5" font-weight="700" fill="#1F2937">Chaque mot possède déjà ses vecteurs Q, K, V</text>
  <text x="82" y="126" font-size="11" fill="#6B7280">Ils ont été produits en appliquant au vecteur du mot les trois transformations apprises pendant l'entraînement.</text>

  <rect x="46" y="142" width="284" height="112" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="188" y="170" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400E">requête de « permis »</text>
  <text x="188" y="189" text-anchor="middle" font-size="11" fill="#B45309">ce que « permis » cherche</text>
  <text x="188" y="228" text-anchor="middle" font-size="18" font-weight="700" fill="#92400E">Q = [ 2, −1, 3 ]</text>

  <rect x="358" y="142" width="284" height="112" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.6"/>
  <text x="500" y="170" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3730A3">clé de « déposer »</text>
  <text x="500" y="189" text-anchor="middle" font-size="11" fill="#4338CA">ce que « déposer » propose</text>
  <text x="500" y="228" text-anchor="middle" font-size="18" font-weight="700" fill="#3730A3">K = [ 1.5, −1, 2 ]</text>

  <rect x="670" y="142" width="284" height="112" rx="12" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.6"/>
  <text x="812" y="170" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">clé de « de »</text>
  <text x="812" y="189" text-anchor="middle" font-size="11" fill="#64748B">ce que « de » propose</text>
  <text x="812" y="228" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">K = [ 0.1, 0.8, −0.2 ]</text>

  <!-- ETAPE 2 -->
  <circle cx="60" cy="292" r="13" fill="#1F2937"/>
  <text x="60" y="297" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">2</text>
  <text x="82" y="297" font-size="13.5" font-weight="700" fill="#1F2937">Le score : un produit scalaire entre la requête et chaque clé</text>
  <text x="82" y="316" font-size="11" fill="#6B7280">On multiplie les nombres position par position (1ʳᵉ avec 1ʳᵉ, 2ᵉ avec 2ᵉ, 3ᵉ avec 3ᵉ), puis on additionne les trois produits.</text>

  <rect x="46" y="332" width="908" height="118" rx="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.8"/>
  <text x="66" y="360" font-size="13" font-weight="700" fill="#065F46">Score( permis, déposer )</text>
  <text x="480" y="396" text-anchor="middle" font-size="16.5" fill="#065F46">2 × 1.5   +   (−1) × (−1)   +   3 × 2      =      3 + 1 + 6      =</text>
  <text x="790" y="397" font-size="20" font-weight="700" fill="#047857">10</text>
  <text x="834" y="396" font-size="12.5" fill="#059669">→ élevé</text>
  <text x="500" y="430" text-anchor="middle" font-size="11" fill="#047857">Même signe et grandeurs proches à chaque position : les trois produits sont positifs et s'additionnent. Les deux vecteurs « pointent dans la même direction ».</text>

  <rect x="46" y="464" width="908" height="118" rx="12" fill="#FFFFFF" stroke="#F43F5E" stroke-width="1.8"/>
  <text x="66" y="492" font-size="13" font-weight="700" fill="#9F1239">Score( permis, de )  —  même calcul, autre clé</text>
  <text x="480" y="528" text-anchor="middle" font-size="16.5" fill="#9F1239">2 × 0.1   +   (−1) × 0.8   +   3 × (−0.2)      =      0.2 − 0.8 − 0.6      =</text>
  <text x="778" y="529" font-size="20" font-weight="700" fill="#BE123C">−1.2</text>
  <text x="838" y="528" font-size="12.5" fill="#E11D48">→ faible</text>
  <text x="500" y="562" text-anchor="middle" font-size="11" fill="#BE123C">Les signes se contredisent d'une position à l'autre : les produits se neutralisent. Cette clé ne répond pas à ce que la requête cherche.</text>

  <!-- ETAPE 3 -->
  <circle cx="60" cy="620" r="13" fill="#1F2937"/>
  <text x="60" y="625" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
  <text x="82" y="625" font-size="13.5" font-weight="700" fill="#1F2937">Des scores aux pourcentages, puis au nouveau sens du mot</text>

  <rect x="46" y="642" width="908" height="146" rx="12" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.6"/>
  <text x="500" y="670" text-anchor="middle" font-size="11.5" fill="#7C3AED">Le même calcul est fait entre la requête de « permis » et la clé de chacun des autres mots de la phrase. Tous les scores obtenus</text>
  <text x="500" y="688" text-anchor="middle" font-size="11.5" fill="#7C3AED">sont ensuite convertis en pourcentages qui totalisent 100 % (opération dite « softmax ») ; les écarts sont amplifiés :</text>
  <text x="500" y="716" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6D28D9">séjour 35 %   demande 25 %   déposer 15 %   Où 10 %   ma 6 %   de 5 %   de 2 %   ? 2 %</text>
  <text x="500" y="744" text-anchor="middle" font-size="11.5" fill="#7C3AED">« Permis » construit alors son nouveau sens en mélangeant les valeurs (V) de tous les mots dans ces proportions :</text>
  <text x="500" y="762" text-anchor="middle" font-size="11.5" fill="#7C3AED">35 % de la valeur de « séjour », 25 % de celle de « demande », etc. Un mot au score faible ne pèse presque rien dans le mélange.</text>
</svg>
