<svg viewBox="0 0 1000 1348" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="1348" fill="#FFFFFF"/>

  <defs>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
    <marker id="abo" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#FB923C"/>
    </marker>
  </defs>

  <text x="500" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#1F2937">Le Modular RAG : le pipeline devient un jeu de briques</text>
  <text x="500" y="72" text-anchor="middle" font-size="13.5" font-style="italic" fill="#6B7280">Troisième génération du RAG, après le Naive et l'Advanced (d'après Gao et al. 2023)</text>

  <!-- ===== ZONE 1 : LE PRINCIPE ===== -->
  <rect x="14" y="92" width="972" height="252" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="32" y="122" font-size="16.5" font-weight="700" fill="#1F2937">1. Le principe : d'une chaîne fixe à des briques recomposables</text>

  <!-- chaîne fixe -->
  <g font-size="13">
    <rect x="34" y="150" width="86" height="46" rx="8" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.4"/>
    <text x="77" y="177" text-anchor="middle" fill="#1E3A8A">Question</text>
    <line x1="122" y1="173" x2="132" y2="173" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
    <rect x="136" y="150" width="92" height="46" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.4"/>
    <text x="182" y="177" text-anchor="middle" fill="#5B21B6">Recherche</text>
    <line x1="230" y1="173" x2="240" y2="173" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
    <rect x="244" y="150" width="96" height="46" rx="8" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.4"/>
    <text x="292" y="177" text-anchor="middle" fill="#1E3A8A">Fragments</text>
    <line x1="342" y1="173" x2="352" y2="173" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
    <rect x="356" y="150" width="60" height="46" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.4"/>
    <text x="386" y="177" text-anchor="middle" fill="#166534">LLM</text>
    <line x1="418" y1="173" x2="428" y2="173" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
    <rect x="432" y="150" width="86" height="46" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.4"/>
    <text x="475" y="177" text-anchor="middle" fill="#065F46">Réponse</text>
  </g>
  <text x="276" y="232" text-anchor="middle" font-size="13" fill="#6B7280">Naive et Advanced RAG : un ordre imposé,</text>
  <text x="276" y="252" text-anchor="middle" font-size="13" fill="#6B7280">toujours le même, quelle que soit la question</text>

  <!-- briques libres -->
  <g font-size="13">
    <rect x="590" y="140" width="104" height="42" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.4"/>
    <text x="642" y="166" text-anchor="middle" fill="#5B21B6">Recherche</text>
    <rect x="740" y="152" width="96" height="42" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.4"/>
    <text x="788" y="178" text-anchor="middle" fill="#9A3412">Routage</text>
    <rect x="876" y="140" width="96" height="42" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.4"/>
    <text x="924" y="166" text-anchor="middle" fill="#92400E">Mémoire</text>
    <rect x="626" y="212" width="110" height="42" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.4"/>
    <text x="681" y="238" text-anchor="middle" fill="#9A3412">Réécriture</text>
    <rect x="782" y="222" width="70" height="42" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.4"/>
    <text x="817" y="248" text-anchor="middle" fill="#166534">LLM</text>
    <rect x="880" y="212" width="92" height="42" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.4"/>
    <text x="926" y="238" text-anchor="middle" fill="#065F46">Réponse</text>
  </g>
  <line x1="694" y1="161" x2="740" y2="170" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="836" y1="172" x2="876" y2="164" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="681" y1="212" x2="650" y2="184" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="736" y1="238" x2="782" y2="242" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="852" y1="242" x2="880" y2="236" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="788" y1="196" x2="788" y2="220" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="4 4"/>
  <text x="781" y="300" text-anchor="middle" font-size="13" fill="#6B7280">Modular RAG : des briques indépendantes, assemblées</text>
  <text x="781" y="320" text-anchor="middle" font-size="13" fill="#6B7280">et réordonnées librement selon la question</text>

  <!-- ===== ZONE 2 : CATALOGUE ===== -->
  <rect x="14" y="360" width="972" height="428" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="32" y="390" font-size="16.5" font-weight="700" fill="#1F2937">2. Le catalogue des briques : quelques modules typiques</text>

  <rect x="30" y="408" width="300" height="164" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.6"/>
  <text x="180" y="436" text-anchor="middle" font-size="15" font-weight="700" fill="#9A3412">Réécriture de requête</text>
  <text x="180" y="464" text-anchor="middle" font-size="13" fill="#7C2D12">reformule la question avant la</text>
  <text x="180" y="484" text-anchor="middle" font-size="13" fill="#7C2D12">recherche : « J'ai perdu mes papiers »</text>
  <text x="180" y="504" text-anchor="middle" font-size="13" fill="#7C2D12">devient une requête explicite sur les</text>
  <text x="180" y="524" text-anchor="middle" font-size="13" fill="#7C2D12">documents d'identité</text>

  <rect x="354" y="408" width="300" height="164" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="504" y="436" text-anchor="middle" font-size="15" font-weight="700" fill="#5B21B6">Recherche élargie</text>
  <text x="504" y="464" text-anchor="middle" font-size="13" fill="#4C1D95">interroge d'autres sources que la</text>
  <text x="504" y="484" text-anchor="middle" font-size="13" fill="#4C1D95">base vectorielle : recherche par</text>
  <text x="504" y="504" text-anchor="middle" font-size="13" fill="#4C1D95">mots-clés, bases de données,</text>
  <text x="504" y="524" text-anchor="middle" font-size="13" fill="#4C1D95">moteur de recherche</text>

  <rect x="678" y="408" width="300" height="164" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.6"/>
  <text x="828" y="436" text-anchor="middle" font-size="15" font-weight="700" fill="#9A3412">Re-classement</text>
  <text x="828" y="464" text-anchor="middle" font-size="13" fill="#7C2D12">retrie les fragments récupérés</text>
  <text x="828" y="484" text-anchor="middle" font-size="13" fill="#7C2D12">avec un modèle de comparaison</text>
  <text x="828" y="504" text-anchor="middle" font-size="13" fill="#7C2D12">plus fin : les plus pertinents</text>
  <text x="828" y="524" text-anchor="middle" font-size="13" fill="#7C2D12">passent en tête</text>

  <rect x="30" y="596" width="300" height="164" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="180" y="624" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Mémoire</text>
  <text x="180" y="652" text-anchor="middle" font-size="13" fill="#78350F">conserve l'historique du dialogue :</text>
  <text x="180" y="672" text-anchor="middle" font-size="13" fill="#78350F">comprendre « et pour un</text>
  <text x="180" y="692" text-anchor="middle" font-size="13" fill="#78350F">renouvellement ? » suppose de se</text>
  <text x="180" y="712" text-anchor="middle" font-size="13" fill="#78350F">souvenir de la question précédente</text>

  <rect x="354" y="596" width="300" height="164" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.6"/>
  <text x="504" y="624" text-anchor="middle" font-size="15" font-weight="700" fill="#9A3412">Routage</text>
  <text x="504" y="652" text-anchor="middle" font-size="13" fill="#7C2D12">oriente chaque question vers le</text>
  <text x="504" y="672" text-anchor="middle" font-size="13" fill="#7C2D12">circuit adapté : simple ou complexe,</text>
  <text x="504" y="692" text-anchor="middle" font-size="13" fill="#7C2D12">démarche fiscale ou état civil,</text>
  <text x="504" y="712" text-anchor="middle" font-size="13" fill="#7C2D12">chaque famille a son chemin</text>

  <rect x="678" y="596" width="300" height="164" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.6"/>
  <text x="828" y="624" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Génération</text>
  <text x="828" y="652" text-anchor="middle" font-size="13" fill="#14532D">le LLM rédige ; il peut être appelé</text>
  <text x="828" y="672" text-anchor="middle" font-size="13" fill="#14532D">plusieurs fois : un brouillon, une</text>
  <text x="828" y="692" text-anchor="middle" font-size="13" fill="#14532D">vérification, puis la réponse</text>
  <text x="828" y="712" text-anchor="middle" font-size="13" fill="#14532D">finale</text>

  <!-- ===== ZONE 3 : MOTIFS ===== -->
  <rect x="14" y="804" width="972" height="332" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="32" y="834" font-size="16.5" font-weight="700" fill="#1F2937">3. Deux motifs d'assemblage caractéristiques</text>

  <!-- motif A : boucle iterative -->
  <text x="260" y="872" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7C3AED">La boucle itérative</text>
  <rect x="40" y="896" width="130" height="52" rx="9" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="105" y="927" text-anchor="middle" font-size="13.5" fill="#5B21B6">Recherche</text>
  <line x1="174" y1="922" x2="192" y2="922" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="196" y="896" width="130" height="52" rx="9" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="261" y="927" text-anchor="middle" font-size="13.5" fill="#166534">Génération</text>
  <line x1="330" y1="922" x2="348" y2="922" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="352" y="890" width="128" height="64" rx="12" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.8"/>
  <text x="416" y="916" text-anchor="middle" font-size="13.5" fill="#9A3412">assez</text>
  <text x="416" y="936" text-anchor="middle" font-size="13.5" fill="#9A3412">d'éléments ?</text>
  <path d="M 416 886 L 416 862 L 105 862 L 105 892" fill="none" stroke="#FB923C" stroke-width="2" marker-end="url(#abo)"/>
  <text x="262" y="854" text-anchor="middle" font-size="13" font-style="italic" fill="#B45309">non : on relance la recherche</text>
  <line x1="416" y1="958" x2="416" y2="982" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
  <text x="446" y="974" font-size="13" fill="#6B7280">oui</text>
  <rect x="352" y="986" width="128" height="48" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="416" y="1015" text-anchor="middle" font-size="13.5" fill="#065F46">Réponse</text>
  <text x="260" y="1078" text-anchor="middle" font-size="13" fill="#6B7280">Le système juge ses propres fragments et</text>
  <text x="260" y="1098" text-anchor="middle" font-size="13" fill="#6B7280">recommence tant qu'il n'a pas de quoi répondre.</text>

  <!-- motif B : routage adaptatif -->
  <text x="750" y="872" text-anchor="middle" font-size="14.5" font-weight="700" fill="#9A3412">Le routage adaptatif</text>
  <rect x="660" y="892" width="180" height="52" rx="9" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="750" y="923" text-anchor="middle" font-size="13.5" fill="#1E3A8A">Question de l'usager</text>
  <line x1="712" y1="948" x2="632" y2="984" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="788" y1="948" x2="868" y2="984" stroke="#9CA3AF" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="530" y="988" width="200" height="86" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="630" y="1014" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065F46">Circuit court</text>
  <text x="630" y="1038" text-anchor="middle" font-size="13" fill="#047857">question simple (horaire,</text>
  <text x="630" y="1058" text-anchor="middle" font-size="13" fill="#047857">adresse) : réponse directe</text>
  <rect x="768" y="988" width="212" height="86" rx="9" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="874" y="1014" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9A3412">Circuit enrichi</text>
  <text x="874" y="1038" text-anchor="middle" font-size="13" fill="#7C2D12">question complexe : réécriture,</text>
  <text x="874" y="1058" text-anchor="middle" font-size="13" fill="#7C2D12">recherche, re-classement</text>
  <text x="755" y="1098" text-anchor="middle" font-size="13" fill="#6B7280">Chaque question emprunte le chemin proportionné à sa difficulté.</text>

  <!-- ===== ZONE 4 : RETENIR ===== -->
  <rect x="14" y="1152" width="972" height="180" rx="14" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.6"/>
  <text x="32" y="1182" font-size="16.5" font-weight="700" fill="#5B21B6">4. Ce qu'il faut retenir</text>
  <text x="500" y="1214" text-anchor="middle" font-size="13.5" fill="#4C1D95">La flexibilité a un coût : plus de briques, c'est plus de réglages, de latence et de points de défaillance possibles.</text>
  <text x="500" y="1242" text-anchor="middle" font-size="13.5" fill="#4C1D95">La recherche reste très active : compromis entre précision de la recherche et souplesse de la génération,</text>
  <text x="500" y="1264" text-anchor="middle" font-size="13.5" fill="#4C1D95">robustesse encore fragile face aux questions bruitées ou ambiguës (Sharma 2025).</text>
  <text x="500" y="1300" text-anchor="middle" font-size="14" font-style="italic" font-weight="600" fill="#6D28D9">Pour Ge-Trouve : hors du périmètre du socle initial ; une piste d'évolution si l'évaluation en montre le besoin.</text>
</svg>
