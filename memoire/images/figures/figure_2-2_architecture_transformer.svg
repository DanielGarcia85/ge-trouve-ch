<svg viewBox="0 20 1060 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="330" fill="#FFFFFF"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Boite 1 : phrase d'entree -->
  <rect x="10" y="48" width="190" height="150" rx="12" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.8"/>
  <text x="105" y="80" text-anchor="middle" font-size="17" font-weight="700" fill="#374151">Phrase d'entrée</text>
  <text x="105" y="112" text-anchor="middle" font-size="15.5" fill="#4B5563">« Où déposer ma</text>
  <text x="105" y="134" text-anchor="middle" font-size="15.5" fill="#4B5563">demande de permis</text>
  <text x="105" y="156" text-anchor="middle" font-size="15.5" fill="#4B5563">de séjour ? »</text>

  <line x1="202" y1="122" x2="212" y2="122" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Boite 2 : embeddings -->
  <rect x="215" y="58" width="180" height="130" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.8"/>
  <text x="305" y="90" text-anchor="middle" font-size="17" font-weight="700" fill="#92400E">Embeddings</text>
  <text x="305" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#92400E">+ position</text>
  <text x="305" y="140" text-anchor="middle" font-size="14" fill="#92400E">chaque mot devient</text>
  <text x="305" y="160" text-anchor="middle" font-size="14" fill="#92400E">un vecteur</text>

  <line x1="397" y1="122" x2="407" y2="122" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ENCODEUR -->
  <rect x="410" y="30" width="210" height="185" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2.2"/>
  <text x="515" y="60" text-anchor="middle" font-size="17" font-weight="700" fill="#1E40AF">ENCODEUR</text>
  <rect x="424" y="74" width="182" height="34" rx="6" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.2"/>
  <rect x="424" y="116" width="182" height="34" rx="6" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.2"/>
  <rect x="424" y="158" width="182" height="34" rx="6" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="515" y="96" text-anchor="middle" font-size="14" fill="#1E3A8A">self-attention</text>
  <text x="515" y="138" text-anchor="middle" font-size="14" fill="#1E3A8A">chaque mot regarde</text>
  <text x="515" y="180" text-anchor="middle" font-size="14" fill="#1E3A8A">tous les autres</text>

  <line x1="622" y1="122" x2="632" y2="122" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- DECODEUR -->
  <rect x="635" y="30" width="210" height="185" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2.2"/>
  <text x="740" y="60" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">DÉCODEUR</text>
  <rect x="649" y="74" width="182" height="34" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.2"/>
  <rect x="649" y="116" width="182" height="34" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.2"/>
  <rect x="649" y="158" width="182" height="34" rx="6" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="740" y="96" text-anchor="middle" font-size="14" fill="#14532D">génère la réponse</text>
  <text x="740" y="138" text-anchor="middle" font-size="14" fill="#14532D">mot à mot, en</text>
  <text x="740" y="180" text-anchor="middle" font-size="14" fill="#14532D">consultant l'encodeur</text>

  <line x1="847" y1="122" x2="857" y2="122" stroke="#9CA3AF" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Boite 5 : reponse -->
  <rect x="860" y="48" width="190" height="150" rx="12" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.8"/>
  <text x="955" y="80" text-anchor="middle" font-size="17" font-weight="700" fill="#374151">Réponse générée</text>
  <text x="955" y="112" text-anchor="middle" font-size="15.5" fill="#4B5563">« À votre</text>
  <text x="955" y="134" text-anchor="middle" font-size="15.5" fill="#4B5563">commune de</text>
  <text x="955" y="156" text-anchor="middle" font-size="15.5" fill="#4B5563">domicile. »</text>

  <text x="105" y="226" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">la question de l'usager</text>
  <text x="955" y="226" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">la réponse de l'assistant</text>

  <text x="530" y="262" text-anchor="middle" font-size="16" fill="#4B5563">L'encodeur analyse la question complète en une seule passe ; le décodeur rédige ensuite la réponse</text>
  <text x="530" y="286" text-anchor="middle" font-size="16" fill="#4B5563">mot après mot, en consultant à chaque étape ce que l'encodeur a compris de la question.</text>
  <text x="530" y="310" text-anchor="middle" font-size="16" fill="#4B5563">En amont, les embeddings convertissent chaque mot en vecteur, la forme numérique de ces calculs.</text>
</svg>
