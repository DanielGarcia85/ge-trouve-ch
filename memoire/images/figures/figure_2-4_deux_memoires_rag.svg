<svg viewBox="0 0 1060 424" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="424" fill="#FFFFFF"/>

  <!-- Carte gauche : mémoire paramétrique -->
  <rect x="8" y="14" width="492" height="252" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="254" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#92400E">Mémoire paramétrique</text>
  <text x="254" y="80" text-anchor="middle" font-size="14.5" font-style="italic" fill="#B45309">à l'intérieur du modèle, dans ses paramètres</text>
  <text x="254" y="122" text-anchor="middle" font-size="14.5" fill="#78350F">acquise une fois pour toutes pendant l'entraînement</text>
  <text x="254" y="150" text-anchor="middle" font-size="14.5" fill="#78350F">figée à la date de coupure</text>
  <text x="254" y="178" text-anchor="middle" font-size="14.5" fill="#78350F">impossible à inspecter ou à citer</text>
  <text x="254" y="226" text-anchor="middle" font-size="15" font-style="italic" font-weight="600" fill="#92400E">« ce que le modèle sait par cœur »</text>

  <!-- Signe plus -->
  <circle cx="530" cy="140" r="24" fill="#F5F3FF" stroke="#A78BFA" stroke-width="2"/>
  <text x="530" y="150" text-anchor="middle" font-size="26" font-weight="700" fill="#6D28D9">+</text>

  <!-- Carte droite : mémoire non paramétrique -->
  <rect x="560" y="14" width="492" height="252" rx="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.2"/>
  <text x="806" y="52" text-anchor="middle" font-size="18" font-weight="700" fill="#1E40AF">Mémoire non paramétrique</text>
  <text x="806" y="80" text-anchor="middle" font-size="14.5" font-style="italic" fill="#3B82F6">un index de documents, à l'extérieur du modèle</text>
  <text x="806" y="122" text-anchor="middle" font-size="14.5" fill="#1E3A8A">consultée au moment de répondre</text>
  <text x="806" y="150" text-anchor="middle" font-size="14.5" fill="#1E3A8A">mise à jour en remplaçant les documents</text>
  <text x="806" y="178" text-anchor="middle" font-size="14.5" fill="#1E3A8A">chaque passage utilisé reste identifiable</text>
  <text x="806" y="226" text-anchor="middle" font-size="15" font-style="italic" font-weight="600" fill="#1E40AF">« le classeur que le modèle peut ouvrir »</text>

  <!-- Bandeau conséquence -->
  <rect x="8" y="294" width="1044" height="116" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="530" y="328" text-anchor="middle" font-size="15.5" fill="#065F46">Le système RAG combine les deux : le modèle rédige, l'index fournit les faits.</text>
  <text x="530" y="356" text-anchor="middle" font-size="15.5" font-weight="700" fill="#047857">Actualiser les connaissances = remplacer les documents de l'index, sans réentraîner le modèle.</text>
  <text x="530" y="388" text-anchor="middle" font-size="14.5" font-style="italic" fill="#059669">Pour Ge-Trouve : un règlement genevois change, on réindexe les documents — le modèle, lui, ne bouge pas.</text>
</svg>
