<svg viewBox="0 0 1060 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="560" fill="#FFFFFF"/>

  <defs>
    <marker id="a25" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- ===== BANDE 1 : INDEXATION ===== -->
  <rect x="8" y="24" width="1044" height="160" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.4"/>
  <text x="24" y="50" font-size="15.5" font-weight="700" fill="#1F2937">1. INDEXATION : préparer la base, hors ligne, une fois pour toutes</text>

  <rect x="20" y="64" width="196" height="106" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.6"/>
  <text x="118" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Documents officiels</text>
  <text x="118" y="120" text-anchor="middle" font-size="14" fill="#4B5563">pages ge.ch, directives,</text>
  <text x="118" y="140" text-anchor="middle" font-size="14" fill="#4B5563">formulaires</text>

  <line x1="220" y1="117" x2="234" y2="117" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <rect x="240" y="64" width="196" height="106" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="338" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Découpage en fragments</text>
  <text x="338" y="120" text-anchor="middle" font-size="14" fill="#92400E">(<tspan font-style="italic">chunks</tspan>) : passages</text>
  <text x="338" y="140" text-anchor="middle" font-size="14" fill="#92400E">courts et cohérents</text>

  <line x1="440" y1="117" x2="454" y2="117" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <rect x="460" y="64" width="196" height="106" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="558" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Conversion en vecteurs</text>
  <text x="558" y="120" text-anchor="middle" font-size="14" fill="#92400E">(<tspan font-style="italic">embeddings</tspan>) : le sens</text>
  <text x="558" y="140" text-anchor="middle" font-size="14" fill="#92400E">devient des nombres</text>

  <line x1="660" y1="117" x2="874" y2="117" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <!-- BASE VECTORIELLE (pont bandes 1-2) -->
  <rect x="884" y="60" width="168" height="254" rx="12" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2.4"/>
  <text x="968" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#5B21B6">BASE</text>
  <text x="968" y="134" text-anchor="middle" font-size="16" font-weight="700" fill="#5B21B6">VECTORIELLE</text>
  <text x="968" y="176" text-anchor="middle" font-size="14" fill="#6D28D9">les vecteurs de tous</text>
  <text x="968" y="196" text-anchor="middle" font-size="14" fill="#6D28D9">les fragments, prêts</text>
  <text x="968" y="216" text-anchor="middle" font-size="14" fill="#6D28D9">à être comparés</text>

  <!-- ===== BANDE 2 : RECHERCHE ===== -->
  <rect x="8" y="198" width="864" height="140" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.4"/>
  <text x="24" y="224" font-size="15.5" font-weight="700" fill="#1F2937">2. RECHERCHE : à chaque question de l'usager</text>

  <rect x="20" y="240" width="300" height="84" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.8"/>
  <text x="170" y="268" text-anchor="middle" font-size="15" fill="#1E3A8A">« Où déposer ma demande</text>
  <text x="170" y="290" text-anchor="middle" font-size="15" fill="#1E3A8A">de permis de séjour ? »</text>
  <text x="170" y="314" text-anchor="middle" font-size="14" font-style="italic" fill="#3B82F6">la question de l'usager</text>

  <line x1="324" y1="282" x2="342" y2="282" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <rect x="348" y="240" width="220" height="84" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="458" y="272" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Mise en vecteur</text>
  <text x="458" y="296" text-anchor="middle" font-size="14" fill="#92400E">avec le même modèle</text>
  <text x="458" y="314" text-anchor="middle" font-size="14" fill="#92400E">d'<tspan font-style="italic">embeddings</tspan></text>

  <text x="724" y="258" text-anchor="middle" font-size="14" fill="#6B7280">recherche des K fragments</text>
  <text x="724" y="276" text-anchor="middle" font-size="14" fill="#6B7280">les plus proches (<tspan font-style="italic">top-K</tspan>)</text>
  <line x1="572" y1="288" x2="874" y2="288" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <!-- retour base -> fragments -->
  <path d="M 968 318 L 968 346 L 140 346 L 140 388" fill="none" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>
  <text x="560" y="340" text-anchor="middle" font-size="14" font-style="italic" fill="#6B7280">les K fragments sont renvoyés</text>

  <!-- ===== BANDE 3 : GENERATION ===== -->
  <rect x="8" y="354" width="1044" height="142" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.4"/>
  <text x="24" y="380" font-size="15.5" font-weight="700" fill="#1F2937">3. GÉNÉRATION : la réponse s'écrit « à livre ouvert »</text>

  <rect x="20" y="394" width="240" height="92" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.6"/>
  <text x="140" y="424" text-anchor="middle" font-size="15" font-weight="700" fill="#1E40AF">K fragments retrouvés</text>
  <text x="140" y="450" text-anchor="middle" font-size="14" fill="#1E3A8A">les passages officiels</text>
  <text x="140" y="470" text-anchor="middle" font-size="14" fill="#1E3A8A">les plus pertinents</text>

  <line x1="264" y1="440" x2="282" y2="440" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <rect x="288" y="394" width="300" height="92" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.8"/>
  <text x="438" y="424" text-anchor="middle" font-size="15" font-weight="700" fill="#9A3412"><tspan font-style="italic">Prompt</tspan> assemblé</text>
  <text x="438" y="450" text-anchor="middle" font-size="14" fill="#9A3412">consigne + fragments</text>
  <text x="438" y="470" text-anchor="middle" font-size="14" fill="#9A3412">+ question</text>

  <line x1="592" y1="440" x2="610" y2="440" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <rect x="616" y="394" width="170" height="92" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="701" y="426" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">LLM</text>
  <text x="701" y="452" text-anchor="middle" font-size="14" fill="#14532D">rédige en s'appuyant</text>
  <text x="701" y="472" text-anchor="middle" font-size="14" fill="#14532D">sur les fragments</text>

  <line x1="790" y1="440" x2="808" y2="440" stroke="#9CA3AF" stroke-width="2.4" marker-end="url(#a25)"/>

  <rect x="814" y="394" width="238" height="92" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.8"/>
  <text x="933" y="424" text-anchor="middle" font-size="15" font-weight="700" fill="#065F46">Réponse</text>
  <text x="933" y="450" text-anchor="middle" font-size="14" fill="#047857">appuyée sur les textes</text>
  <text x="933" y="470" text-anchor="middle" font-size="14" fill="#047857">officiels, sources identifiables</text>

  <!-- Synthese -->
  <text x="530" y="524" text-anchor="middle" font-size="15" fill="#4B5563">Contrairement au RAG fondateur de 2020, le modèle n'est plus ajusté : il reste tel quel et reçoit les fragments</text>
  <text x="530" y="548" text-anchor="middle" font-size="15" fill="#4B5563">directement dans sa fenêtre de contexte. Il répond en consultant, sans rien réapprendre.</text>
</svg>
