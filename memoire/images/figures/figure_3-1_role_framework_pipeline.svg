<svg viewBox="0 0 1060 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="520" fill="#FFFFFF"/>

  <defs>
    <marker id="ab31" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- ===== BANDE 1 : INDEXATION ===== -->
  <rect x="8" y="24" width="864" height="118" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.4"/>
  <text x="24" y="48" font-size="15.5" font-weight="700" fill="#1F2937">1. INDEXATION : préparer la base, hors ligne, une fois pour toutes</text>

  <rect x="20" y="62" width="180" height="58" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.6"/>
  <text x="110" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Documents officiels</text>

  <line x1="200" y1="91" x2="320" y2="91" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="260" y="80" text-anchor="middle" font-size="12" fill="#1D4ED8">charger, extraire</text>

  <rect x="320" y="62" width="206" height="58" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="423" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Découpage en fragments</text>

  <line x1="526" y1="91" x2="566" y2="91" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>

  <rect x="566" y="62" width="196" height="58" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="664" y="96" text-anchor="middle" font-size="14.5" font-weight="700" fill="#92400E">Conversion en vecteurs</text>
  <rect x="682" y="52" width="74" height="20" rx="9" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="719" y="66" text-anchor="middle" font-size="11.5" fill="#4B5563">chapitre 5</text>

  <line x1="762" y1="91" x2="874" y2="91" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="818" y="80" text-anchor="middle" font-size="12" fill="#1D4ED8">indexer</text>

  <!-- BASE VECTORIELLE (pont bandes 1-2) -->
  <rect x="884" y="44" width="168" height="210" rx="12" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2.4"/>
  <text x="968" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#5B21B6">BASE</text>
  <text x="968" y="162" text-anchor="middle" font-size="16" font-weight="700" fill="#5B21B6">VECTORIELLE</text>
  <rect x="972" y="34" width="74" height="20" rx="9" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="1009" y="48" text-anchor="middle" font-size="11.5" fill="#4B5563">chapitre 6</text>

  <!-- ===== BANDE 2 : RECHERCHE ===== -->
  <rect x="8" y="156" width="864" height="104" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.4"/>
  <text x="24" y="180" font-size="15.5" font-weight="700" fill="#1F2937">2. RECHERCHE : à chaque question de l'usager</text>

  <rect x="20" y="194" width="224" height="52" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.8"/>
  <text x="132" y="225" text-anchor="middle" font-size="15" font-weight="700" fill="#1E40AF">Question de l'usager</text>

  <line x1="244" y1="220" x2="316" y2="220" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>

  <rect x="316" y="194" width="170" height="52" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="401" y="225" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">Mise en vecteur</text>

  <line x1="486" y1="220" x2="874" y2="220" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="680" y="209" text-anchor="middle" font-size="12" fill="#1D4ED8">rechercher les K plus proches (<tspan font-style="italic">top-K</tspan>)</text>

  <!-- Retour base -> bande 3 -->
  <path d="M 968 254 L 968 270 L 140 270 L 140 320" fill="none" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="554" y="264" text-anchor="middle" font-size="12" fill="#1D4ED8">renvoyer les K fragments</text>

  <!-- ===== BANDE 3 : GENERATION ===== -->
  <rect x="8" y="286" width="1044" height="104" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.4"/>
  <text x="24" y="310" font-size="15.5" font-weight="700" fill="#1F2937">3. GÉNÉRATION : la réponse s'écrit « à livre ouvert »</text>

  <rect x="20" y="324" width="200" height="52" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.6"/>
  <text x="120" y="355" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1E40AF">K fragments retrouvés</text>

  <line x1="220" y1="350" x2="310" y2="350" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="265" y="339" text-anchor="middle" font-size="12" fill="#1D4ED8">assembler</text>

  <rect x="310" y="324" width="190" height="52" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.8"/>
  <text x="405" y="355" text-anchor="middle" font-size="15" font-weight="700" fill="#9A3412"><tspan font-style="italic">Prompt</tspan> assemblé</text>

  <line x1="500" y1="350" x2="590" y2="350" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="545" y="339" text-anchor="middle" font-size="12" fill="#1D4ED8">appeler</text>

  <rect x="590" y="324" width="130" height="52" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="655" y="356" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">LLM</text>
  <rect x="640" y="314" width="74" height="20" rx="9" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="677" y="328" text-anchor="middle" font-size="11.5" fill="#4B5563">chapitre 4</text>

  <line x1="720" y1="350" x2="850" y2="350" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="785" y="339" text-anchor="middle" font-size="12" fill="#1D4ED8">renvoyer et sourcer</text>

  <rect x="850" y="324" width="202" height="52" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.8"/>
  <text x="951" y="355" text-anchor="middle" font-size="15" font-weight="700" fill="#065F46">Réponse sourcée</text>

  <!-- ===== LEGENDE ===== -->
  <line x1="30" y1="424" x2="62" y2="424" stroke="#2563EB" stroke-width="3.5" marker-end="url(#ab31)"/>
  <text x="72" y="429" font-size="13" fill="#4B5563">code de liaison fourni par un framework : l'objet de ce chapitre</text>

  <rect x="560" y="414" width="70" height="19" rx="9" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="595" y="428" text-anchor="middle" font-size="11.5" fill="#4B5563">chapitre N</text>
  <text x="640" y="429" font-size="13" fill="#4B5563">maillon à choisir dans les chapitres 4 à 6</text>

  <!-- ===== MESSAGE ===== -->
  <text x="530" y="470" text-anchor="middle" font-size="15" fill="#4B5563">Les boîtes sont les composants et les données du pipeline ; les flèches sont le code qui les relie : charger,</text>
  <text x="530" y="494" text-anchor="middle" font-size="15" fill="#4B5563">découper, indexer, rechercher, assembler, appeler. C'est cette couche de liaison qu'un framework fournit.</text>
</svg>
