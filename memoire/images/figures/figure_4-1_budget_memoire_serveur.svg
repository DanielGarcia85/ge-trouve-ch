<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="500" fill="#FFFFFF"/>

  <!-- Légende des postes fixes -->
  <rect x="30" y="30" width="14" height="14" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.3"/>
  <text x="52" y="42" font-size="16" fill="#374151">Système : &#8776; 1,5 Go</text>
  <rect x="250" y="30" width="14" height="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/>
  <text x="272" y="42" font-size="16" fill="#374151">Embeddings (chap. 5) : 0,5 à 1,5 Go</text>
  <rect x="590" y="30" width="14" height="14" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.3"/>
  <text x="612" y="42" font-size="16" fill="#374151">Base vectorielle (chap. 6) : &lt; 0,5 Go</text>
  <rect x="30" y="62" width="14" height="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.3"/>
  <text x="52" y="74" font-size="16" fill="#374151">Application web : &#8776; 1 Go</text>
  <rect x="290" y="62" width="14" height="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.3"/>
  <text x="312" y="74" font-size="16" fill="#374151">Réserve (pointes) : &#8776; 1,5 Go</text>

  <!-- Palier plancher 12 Go -->
  <text x="30" y="132" font-size="18" font-weight="bold" fill="#374151">Palier plancher : 12 Go</text>
  <rect x="30" y="144" width="77.3" height="76" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="107.3" y="144" width="77.3" height="76" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="184.6" y="144" width="25.7" height="76" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <rect x="210.3" y="144" width="51.5" height="76" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <rect x="261.8" y="144" width="77.3" height="76" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="339.1" y="144" width="308.9" height="76" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
  <text x="493.5" y="176" text-anchor="middle" font-size="19" font-weight="bold" fill="#166534">Modèle de langage</text>
  <text x="493.5" y="208" text-anchor="middle" font-size="23" font-weight="bold" fill="#166534">5 à 6 Go</text>

  <!-- Palier de confort 18 Go -->
  <text x="30" y="268" font-size="18" font-weight="bold" fill="#374151">Palier de confort : 18 Go</text>
  <rect x="30" y="280" width="77.3" height="76" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="107.3" y="280" width="77.3" height="76" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="184.6" y="280" width="25.7" height="76" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <rect x="210.3" y="280" width="51.5" height="76" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <rect x="261.8" y="280" width="77.3" height="76" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="339.1" y="280" width="617.9" height="76" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
  <text x="648" y="312" text-anchor="middle" font-size="21" font-weight="bold" fill="#166534">Modèle de langage</text>
  <text x="648" y="346" text-anchor="middle" font-size="26" font-weight="bold" fill="#166534">10 à 11 Go</text>

  <!-- Message -->
  <text x="500" y="428" text-anchor="middle" font-size="19" fill="#111827">À postes fixes identiques, le palier de confort porte l'enveloppe du modèle de langage</text>
  <text x="500" y="462" text-anchor="middle" font-size="19" fill="#111827">de <tspan font-weight="bold">5 à 6 Go</tspan> à environ <tspan font-weight="bold">10 à 11 Go</tspan>.</text>
</svg>
